<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>카지노 토참시</title>

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
    }

    .wrapper {
      position: relative;
  width: 100%;        /* ✅ 모바일 기본: 화면 꽉 */
  margin: auto;
}

/* ✅ PC에서는 화면 60%만 차지 */
@media (min-width: 900px) {
  .wrapper {
    width: 60%;
  }
}

.wrapper img {
  width: 100%;
  display: block;
}
    }

    /* ✅ PNG 원본 이미지 */
    .wrapper img {
      width: 100%;
      display: block;
    }

    /* ✅ 클릭 영역 공통 */
    .click-zone {
      position: absolute;
      left: 3%;
      width: 93%;
      height: 15%;
      cursor: pointer;
    }

    /* ✅ 각각 위치 조정 */
    .zone1 { top: 47%; }
    .zone2 { top: 64%; }
    .zone3 { top: 81%; }

    /* 클릭 시 살짝 효과 */
    .click-zone:hover 
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <!-- ✅ 디자인 PNG 그대로 표시 -->
    <img src="landing.png.png" alt="랜딩 이미지" />

    <!-- ✅ LIVE 바로가기 -->
    <a class="click-zone zone1"
       href="https://dlive.tv/tochamsi"
       target="_blank"
       rel="noopener noreferrer"></a>

    <!-- ✅ 카카오톡 바로가기 -->
    <a class="click-zone zone2"
       href="https://open.kakao.com/o/sZPGH9Dg"
       target="_blank"
       rel="noopener noreferrer"></a>

    <!-- ✅ 텔레그램 바로가기 -->
    <a class="click-zone zone3"
       href="https://t.me/storyinquiry"
       target="_blank"
       rel="noopener noreferrer"></a>

  </div>

</body>
</html>
